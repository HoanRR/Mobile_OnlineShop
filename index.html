<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cửa hàng Điện thoại HT</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="thanh-nav">
        <div class="logo">HT Mobile</div>

        <div class="tim-kiem">
            <input type="text" placeholder="Bạn cần tìm điện thoại gì?">
        </div>
        <div class="nut-bam-header">
            <div class="tra-cuu-don-hang">
                <button>
                    <img src="./img/clipboard.png">
                    <h3>Tra cứu đơn hàng</h3>
                </button>
            </div>
            <div class="Dang-nhap">
                <button>
                    <img src="./img/user-interface.png">
                    <h3>
                        Đăng nhập
                    </h3>
                </button>

            </div>
            <div class="gio-hang">
                <button>
                    <img src="./img/gio_hang.png">
                    <h3>
                        Giỏ hàng
                    </h3>
                </button>
            </div>

        </div>


    </header>

    <main class="noi-dung">
        <h2 class="tieu-de-phan">Điện Thoại Nổi Bật</h2>

        <div class="danh-sach-san-pham" id="danh-sach-sp">


        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
