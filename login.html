<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header-placeholder"></div>
    <main id="khu-vuc-dang-nhap" class="noi-dung">
        <div>
            <h2>
                Đăng nhập
            </h2>
            <h3>
                Bạn cần đăng nhập để mua sắm dễ dàng hơn
            </h3>
            <p>Bạn chưa có tài khoản? <a href="register.html">Đăng ký</a></p>
        </div>
        <div>
            <label for="username">Số điện thoại hoặc Email</label><br>
            <input type="text" id="username" placeholder="Nhập tài khoản hoặc Email"><br>
            <br>
        
            <label for="password">Mật khẩu</label><br>
            <input type="password" id="password" placeholder="Nhập mật khẩu của bạn"><br>

            <a href=".">Quên mật khẩu?</a>
        </div>
        <br>
        <button>
            Đăng nhập
        </button>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
