<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/product-detail.css">

</head>

<body>
    <div id="header-placeholder"></div>
    <div class="wrapper-product-detail">
        <div class="left-column">
            <div class="image-product-detail">
                <img id="main-image" alt="Sản phẩm">
            </div>



            <div class="mo-ta-san-pham">
                <h3>Đánh giá chi tiết</h3>
                <div id="product-description" class="noi-dung-mo-ta">
                    Đang tải mô tả ....
                </div>
            </div>


        </div>

        <div class="right-column">
            <div class="inform-product-detail">
                <span id="label-detail">iphone</span>
                <h2 id="product-name">Đang tải tên sản phẩm...</h2>



                <div class="rating_available">
                    <span id="rating">⭐⭐⭐⭐⭐ (128 đánh giá)</span>
                    <span id="available"> Còn hàng</span>
                </div>

                <div class="price-product-detail">
                    <h2 id="product-price">0đ</h2>
                    <span id="old-price" style="display:none;"><del></del></span>
                </div>


                <div class="variants-section">
                    <p class="config-label">Tùy chọn cấu hình & Màu sắc:</p>
                    <div id="variant-options" class="button-dung-luong">
                    </div>
                </div>

                <div class="quantity-section" style="margin: 15px 0;">
                    <p class="config-label">Số lượng:</p>
                    <input type="number" id="product-quantity" value="1" min="1" max="10"
                        style="width: 60px; padding: 5px;">
                </div>

                <div class="detail-action">
                    <button class="btn-mua-ngay">Mua ngay</button>
                    <button class="btn-them-gio-hang">Thêm vào giỏ hàng</button>
                </div>
            </div>

            <div class="thong-so-section">
                <h3>Thông số kĩ thuật</h3>
                <table class="thong-so-ky-thuat">

                </table>
            </div>


        </div>
    </div>
    <div class="khu-vuc-danh-gia">
        <div class=".header-danh-gia">
            <h2 id="header-danh-gia">Hỏi đáp & đánh giá Samsung Galaxy A06 5G Chính hãng</h2>
        </div>

        <div class="tong-quan-danh-gia">
            <div class="cot-diem">
                <div class="diem-so">5/5</div>
                <div class="sao-tong">⭐⭐⭐⭐⭐</div>
                <div class="tong-so-danh-gia">73 đánh giá và hỏi đáp</div>
            </div>

            <div class="cot-thanh-sao">
                <div class="dong-sao">
                    <span>5 Sao</span>
                    <div class="thanh-ngang">
                        <div class="phan-tram" style="width: 100%;"></div>
                    </div>
                    <span>73</span>
                </div>
                <div class="dong-sao">
                    <span>4 Sao</span>
                    <div class="thanh-ngang">
                        <div class="phan-tram" style="width: 0%;"></div>
                    </div>
                    <span>0</span>
                </div>
                <div class="dong-sao">
                    <span>3 Sao</span>
                    <div class="thanh-ngang">
                        <div class="phan-tram" style="width: 0%;"></div>
                    </div>
                    <span>0</span>
                </div>
                <div class="dong-sao">
                    <span>2 Sao</span>
                    <div class="thanh-ngang">
                        <div class="phan-tram" style="width: 0%;"></div>
                    </div>
                    <span>0</span>
                </div>
                <div class="dong-sao">
                    <span>1 Sao</span>
                    <div class="thanh-ngang">
                        <div class="phan-tram" style="width: 0%;"></div>
                    </div>
                    <span>0</span>
                </div>
            </div>


        </div>



        <div class="danh-sach-binh-luan-mc">




        </div>
    </div>
    <div id="footer-placeholder"></div>

    <script type="module" src="js/product_detail.js"></script>
    <script src="js/common.js"></script>

</body>

</html>
