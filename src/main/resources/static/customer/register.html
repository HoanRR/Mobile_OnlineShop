<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - HT Mobile</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <div id="header-placeholder"></div>

    <main class="noi-dung">
        <div class="auth-container">
            <div class="auth-header">
                <h2>Đăng ký</h2>
                <p>Bạn đã có tài khoản? <a href="login.html">Đăng nhập</a></p>
            </div>
            
            <form id="register-form" class="auth-form" onsubmit="xuLyDangKy(event)">
                <div id="error-message"></div>

                <div class="form-group">
                    <label for="reg-username">Tên đăng nhập</label>
                    <input type="text" id="reg-username" placeholder="Nhập tên đăng nhập viết liền không dấu" required>
                </div>
                
                <div class="form-group">
                    <label for="reg-fullname">Họ và Tên</label>
                    <input type="text" id="reg-fullname" placeholder="Nhập họ và tên đầy đủ" required>
                </div>

                <div class="form-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" placeholder="Nhập địa chỉ Email" required>
                </div>

                <div class="form-group">
                    <label for="reg-phone">Số điện thoại</label>
                    <input type="tel" id="reg-phone" placeholder="Nhập số điện thoại (bắt đầu bằng số 0)" required>
                </div>

                <div class="form-group">
                    <label for="reg-password">Mật khẩu</label>
                    <input type="password" id="reg-password" placeholder="Nhập mật khẩu (ít nhất 6 ký tự)" required>
                </div>

                <button type="submit" id="btn-submit-register">Đăng ký tài khoản</button>
            </form>
        </div>
    </main>

    <script src="js/common.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
