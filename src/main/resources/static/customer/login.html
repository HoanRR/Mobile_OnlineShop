<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - HT Mobile</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <div id="header-placeholder"></div>

    <main class="noi-dung">
        <div class="auth-container">
            <div class="auth-header">
                <h2>Đăng nhập</h2>
                <p>Bạn chưa có tài khoản? <a href="register.html">Đăng ký ngay</a></p>
            </div>
            
            <form id="login-form" class="auth-form" onsubmit="xuLyDangNhap(event)">
                <div id="error-message"></div>

                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <input type="text" id="username" placeholder="Nhập tên đăng nhập của bạn" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" placeholder="Nhập mật khẩu" required>
                </div>

                <div class="form-options">
                    <a href="reset-password.html">Quên mật khẩu?</a>
                </div>

                <button type="submit">Đăng nhập</button>
            </form>
        </div>
    </main>

    <script src="js/common.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
