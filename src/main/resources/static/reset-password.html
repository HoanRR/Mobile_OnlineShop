<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="../static/css/base.css">
    <link rel="stylesheet" href="../static/css/header.css">
    <link rel="stylesheet" href="../static/css/reset-password.css">
</head>
<body>
    <div id="header-placeholder"></div>
    <main id="khu-vuc-quen-mat-khau" class="noi-dung">
        <div id="step-1">
            <div>
                <h2>Quên mật khẩu</h2>
                <h3>Hãy nhập địa chỉ Email của bạn để nhận mã OTP khôi phục mật khẩu.</h3>
            </div>
            <div class="form-group">
                <label for="dia-chi-email">Địa chỉ Email</label>
                <input type="email" id="dia-chi-email" placeholder="Nhập địa chỉ Email của bạn">
            </div>
            <div id="error-message"></div>

            <button type="button" id="btn-send-otp">Gửi mã OTP</button>
            <div style="text-align: center; margin-top: 15px;">
                <a href="login.html" style="color: #FF3D00; text-decoration: none;">Quay lại đăng nhập</a>
            </div>
        </div>

        <!-- Step 2: Nhập OTP và Mật khẩu mới -->
        <div id="step-2" style="display: none;">
            <div>
                <h2>Đặt lại mật khẩu</h2>
                <h3 id="otp-sent-msg">Mã OTP đã được gửi về email của bạn.</h3>
            </div>
            <div class="form-group">
                <label for="otp-code">Mã OTP (6 chữ số)</label>
                <input type="text" id="otp-code" placeholder="Nhập mã OTP">
            </div>
            <div class="form-group">
                <label for="new-password">Mật khẩu mới</label>
                <input type="password" id="new-password" placeholder="Nhập mật khẩu mới">
            </div>
            <div class="form-group">
                <label for="confirm-password">Xác nhận mật khẩu mới</label>
                <input type="password" id="confirm-password" placeholder="Nhập lại mật khẩu mới">
            </div>
            <button type="button" id="btn-reset-password">Xác nhận thay đổi</button>
            <div style="text-align: center; margin-top: 15px;">
                <a href="#" id="btn-back-step-1" style="color: #666; text-decoration: none;">Quay lại nhập email</a>
            </div>
        </div>
    </main>
    
    
    <script src="../static/js/common.js"></script>
    <script src="../static/js/reset-password.js"></script>

</body>
</html>
