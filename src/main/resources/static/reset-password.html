<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khôi phục mật khẩu - HT Mobile</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <div id="header-placeholder"></div>

    <main class="noi-dung">
        <div class="auth-container">
            <div class="auth-header">
                <h2>Quên mật khẩu?</h2>
                <p>Nhập email của bạn và chúng tôi sẽ gửi hướng dẫn khôi phục mật khẩu</p>
            </div>
            
            <form id="reset-form" class="auth-form" onsubmit="xuLyQuenMatKhau(event)">
                <div id="error-message"></div>

                <div class="form-group">
                    <label for="reset-email">Email của bạn</label>
                    <input type="email" id="reset-email" placeholder="Ví dụ: email@domain.com" required>
                </div>
                
                <button type="submit" id="btn-submit-reset">Gửi yêu cầu khôi phục</button>

                <div class="form-options" style="justify-content: center; margin-top: 20px;">
                    <a href="login.html" style="color: #666;">Quay lại đăng nhập</a>
                </div>
            </form>
        </div>
    </main>

    <script src="js/common.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
