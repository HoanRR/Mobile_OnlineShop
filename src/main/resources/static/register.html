<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - HT Mobile</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <div id="header-placeholder"></div>

    <main id="khu-vuc-dang-nhap" class="noi-dung">
        <div>
            <h2>Đăng ký</h2>
            <h3>Đăng ký để nhận nhiều ưu đãi</h3>
            <p>Bạn đã có tài khoản? <a href="login.html">Đăng nhập</a></p>
        </div>
        <div>
            <label for="ho-va-ten">Họ và Tên</label><br>
            <input type="text" id="ho-va-ten" placeholder="Nhập Họ và Tên"><br>
            <br>

            <label for="Email">Email</label><br>
            <input type="email" id="Email" placeholder="Nhập địa chỉ Email"><br>
            <br>

            <label for="sdt">Số điện thoại</label><br>
            <input type="text" id="sdt" placeholder="Nhập số điện thoại (bắt đầu từ 0)"><br>
            <br>

            <label for="password">Mật khẩu</label><br>
            <input type="password" id="password" placeholder="Nhập mật khẩu của bạn (ít nhất 6 ký tự)"><br>
            <br>

            <label>Giới tính</label><br>
            <div style="margin-bottom: 15px;">
                <label style="margin-right: 20px;">
                    <input type="radio" name="gender" value="MALE"> Nam
                </label>
                <label style="margin-right: 20px;">
                    <input type="radio" name="gender" value="FEMALE"> Nữ
                </label>
                <label>
                    <input type="radio" name="gender" value="OTHER"> Khác
                </label>
            </div>

            <div id="error-message" style="color: red; text-align: center; margin-top: 10px; display: none;"></div>
        </div>

        <br>
        <button id="button-dang-ky" onclick="xuLyDangKy(event)">
            Đăng ký
        </button>
    </main>

    <script src="js/common.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
