<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Thêm Sản phẩm Mới - Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../../static/admin/css/admin-base.css">
  <link rel="stylesheet" href="../../static/admin/css/add-product.css">
  <script src="../../static/js/api-client.js"></script>
    <script src="../../static/admin/js/common.js"></script>
<script src="../../static/admin/js/add-product.js"></script>
</head>
<body>
<div class="app-wrapper">
    <div id="sidebar-container"></div>

    <div class="main-content" id="mainContent">
        <div id="header-container"></div>

    <div class="page-body">
      <div style="max-width: 900px; margin: 0 auto;">
        <a href="products.html" style="color: var(--muted); text-decoration: none; font-size: 14px; margin-bottom: 20px; display: inline-block;"><i class="fa-solid fa-arrow-left"></i> Quay lại Danh sách</a>
        
        <form class="form-wrap">
          <h2 class="form-title">Thông tin chung</h2>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
              <div class="form-group"><label>Tên Sản phẩm</label><input type="text" id="productName" placeholder="VD: iPhone 15 Pro Max" required></div>
              <div class="form-group"><label>Hãng (Brand)</label><select id="productBrand" required><option value="">-- Chọn hãng --</option><option>Apple</option><option>Samsung</option><option>Xiaomi</option><option>OPPO</option></select></div>
              <div class="form-group"><label>Link ảnh sản phẩm</label><input type="url" id="productImageLink" placeholder="https://..."></div>
            </div>
            <div>
              <div class="form-group" style="height: calc(100% - 20px);">
                <label>Ảnh đại diện</label>
                <div style="border: 2px dashed var(--border); border-radius: 10px; height: 100%; min-height: 140px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--muted); cursor: pointer;" onclick="document.getElementById('file-upload').click();">
                  <i class="fa-solid fa-cloud-arrow-up" style="font-size:30px; margin-bottom:10px;"></i><p>Bấm chọn ảnh</p>
                  <input type="file" id="file-upload" accept="image/*" style="display: none;">
                </div>
              </div>
            </div>
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group"><label>Chip xử lý</label><input type="text" id="productChip" placeholder="VD: Apple A17 Pro"></div>
            <div class="form-group"><label>Dung lượng Pin</label><input type="text" id="batteryCapacity" placeholder="VD: 4422 mAh"></div>
            <div class="form-group"><label>Độ phân giải</label><input type="text" id="resolution" placeholder="VD: 2796 x 1290"></div>
          </div>

          <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
            <h2 class="form-title" style="border:none; margin:0; padding:0;">Phiên bản cấu hình</h2>
            <button type="button" class="btn-edit" onclick="addVariantRow()"><i class="fa-solid fa-plus"></i> Thêm</button>
          </div>
          
          <table class="admin-table" id="variantTable">
            <thead><tr><th>RAM</th><th>Bộ nhớ</th><th>Màu sắc</th><th>Giá bán</th><th>Tồn kho</th><th>Link ảnh</th><th style="text-align: center;">Xóa</th></tr></thead>
            <tbody>
              <tr>
                <td><input type="text" data-field="ram" placeholder="8GB" style="width:100%; padding:10px; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:6px;"></td>
                <td><input type="text" data-field="storage_capacity" placeholder="256GB" style="width:100%; padding:10px; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:6px;"></td>
                <td><input type="text" data-field="color" placeholder="Titan" style="width:100%; padding:10px; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:6px;"></td>
                <td><input type="number" data-field="price" placeholder="29990000" style="width:100%; padding:10px; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:6px;"></td>
                <td><input type="number" data-field="total_available" placeholder="12" style="width:100%; padding:10px; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:6px;"></td>
                <td><input type="url" data-field="variant_image_link" placeholder="https://..." style="width:100%; padding:10px; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:6px;"></td>
                <td style="text-align: center;"><button type="button" class="btn-delete"><i class="fa-solid fa-trash"></i></button></td>
              </tr>
            </tbody>
          </table>

          <div style="display: flex; justify-content: flex-end; margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px;">
            <button type="submit" class="btn-add"><i class="fa-solid fa-floppy-disk"></i> Lưu Sản phẩm</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
</body>
</html>
