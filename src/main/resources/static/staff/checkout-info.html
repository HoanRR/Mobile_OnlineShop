<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác nhận đơn hàng - HT Mobile POS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/staff-base.css">
    <link rel="stylesheet" href="css/checkout-info.css">
</head>

<body>
    <div class="app-wrapper">
        <div id="sidebar-container"></div>

        <div class="main-content" id="mainContent">
            <div id="header-container"></div>

            <div class="page-body checkout-page">
                <a href="pos.html" class="back-link">
                    <i class="fa-solid fa-arrow-left"></i> Quay lại POS
                </a>

                <h2 class="page-title">Xác nhận & Thanh toán</h2>

                <div class="checkout-grid">

                    <!-- Cột trái: Form thông tin -->
                    <div class="checkout-left">

                        <!-- Bước 1: Thông tin khách hàng -->
                        <div class="checkout-section">
                            <h3><span class="step-number">1</span> Thông tin khách hàng</h3>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Họ và tên <span class="required">*</span></label>
                                    <input type="text" id="customerName" placeholder="VD: Nguyễn Văn A" value="Khách lẻ" required>
                                </div>
                                <div class="form-group">
                                    <label>Số điện thoại <span class="required">*</span></label>
                                    <input type="tel" id="customerPhone" placeholder="VD: 0901234567" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Email (Tùy chọn)</label>
                                <input type="email" id="customerEmail" placeholder="VD: khachhang@email.com">
                            </div>
                        </div>

                        <!-- Bước 2: Giao nhận -->
                        <div class="checkout-section">
                            <h3><span class="step-number">2</span> Hình thức giao nhận</h3>
                            <div class="payment-methods">
                                <label class="payment-option">
                                    <input type="radio" name="receiveType" value="store" checked onchange="toggleAddressField()">
                                    <span class="custom-radio"></span>
                                    <i class="fa-solid fa-store"></i> Nhận tại cửa hàng
                                </label>
                                <label class="payment-option">
                                    <input type="radio" name="receiveType" value="delivery" onchange="toggleAddressField()">
                                    <span class="custom-radio"></span>
                                    <i class="fa-solid fa-truck"></i> Giao hàng tận nơi
                                </label>
                            </div>
                            <div class="form-group" id="addressGroup" style="display: none; margin-top: 12px;">
                                <label>Địa chỉ giao hàng <span class="required">*</span></label>
                                <input type="text" id="customerAddress" placeholder="Số nhà, tên đường, phường/xã, quận/huyện, tỉnh/TP">
                            </div>
                        </div>

                        <!-- Bước 3: Thanh toán -->
                        <div class="checkout-section">
                            <h3><span class="step-number">3</span> Phương thức thanh toán</h3>
                            <div class="payment-methods">
                                <label class="payment-option">
                                    <input type="radio" name="payment" value="COD" checked>
                                    <span class="custom-radio"></span>
                                    <i class="fa-solid fa-money-bill-wave"></i> Tiền mặt
                                </label>
                                <label class="payment-option">
                                    <input type="radio" name="payment" value="ATM">
                                    <span class="custom-radio"></span>
                                    <i class="fa-solid fa-credit-card"></i> Chuyển khoản / ATM
                                </label>
                                <label class="payment-option">
                                    <input type="radio" name="payment" value="ShopeePay">
                                    <span class="custom-radio"></span>
                                    <i class="fa-solid fa-mobile-screen"></i> Ví điện tử
                                </label>
                            </div>
                        </div>

                        <!-- Ghi chú -->
                        <div class="checkout-section">
                            <h3>Ghi chú</h3>
                            <div class="form-group">
                                <textarea id="orderNote" rows="3" placeholder="Ghi chú thêm cho đơn hàng..."></textarea>
                            </div>
                        </div>

                        <!-- Nút hành động -->
                        <div class="form-actions">
                            <a href="pos.html" class="btn-cancel">
                                <i class="fa-solid fa-xmark"></i> Hủy
                            </a>
                            <button type="button" id="btnConfirmOrder" onclick="xuLyTaodon()">
                                <i class="fa-solid fa-check"></i> Xác nhận thanh toán
                            </button>
                        </div>

                    </div>

                    <!-- Cột phải: Tóm tắt đơn hàng -->
                    <aside class="checkout-right">
                        <div class="order-summary">
                            <h3>Tóm tắt đơn hàng</h3>

                            <!-- Danh sách sản phẩm -->
                            <div id="summaryItems"></div>

                            <!-- Dòng voucher (nếu có) -->
                            <div id="voucher-info-row" style="display: none; margin: 12px 0; padding: 10px 12px; background: #f0fdf4; border-radius: 8px; border: 1px solid #bbf7d0; font-size: 13px; color: #16a34a;">
                                <i class="fa-solid fa-ticket"></i> <span id="voucher-info-text"></span>
                            </div>

                            <!-- Tổng tiền -->
                            <div class="summary-box">
                                <div class="summary-line">
                                    <span>Tạm tính</span>
                                    <strong id="summarySubtotal">0 ₫</strong>
                                </div>
                                <div class="summary-line" id="discountRow" style="color: #16a34a; display: none;">
                                    <span>Giảm giá (Voucher)</span>
                                    <strong id="summaryDiscount">0 ₫</strong>
                                </div>
                                <div class="summary-line total">
                                    <span>THÀNH TIỀN</span>
                                    <strong id="summaryTotal">0 ₫</strong>
                                </div>
                            </div>
                        </div>
                    </aside>

                </div>
            </div>
        </div>
    </div>

    <!-- Modal thành công -->
    <div class="modal-overlay" id="orderSuccessModal" style="display: none;">
        <div class="receipt-modal">
            <div class="receipt-header">
                <div>
                    <h3><i class="fa-solid fa-circle-check" style="color: #16a34a;"></i> Tạo đơn thành công!</h3>
                    <p id="receiptOrderId" style="color: var(--muted); font-size: 14px;"></p>
                </div>
            </div>
            <div class="receipt-body" id="receiptBody"></div>
            <div class="receipt-actions">
                <button type="button" class="btn-cancel" onclick="window.location.href='pos.html'">
                    <i class="fa-solid fa-plus"></i> Đơn mới
                </button>
                <button type="button" class="btn-cancel" onclick="window.print()">
                    <i class="fa-solid fa-print"></i> In hóa đơn
                </button>
                <button type="button" class="btn-submit" onclick="window.location.href='orders.html'">
                    <i class="fa-solid fa-list"></i> Xem đơn hàng
                </button>
            </div>
        </div>
    </div>

</body>
<script src="../customer/js/api-client.js"></script>
<script src="js/common.js"></script>
<script src="js/checkout-info.js"></script>

</html>
