<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết Đánh giá - HT Mobile Staff</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/staff-base.css">
    <link rel="stylesheet" href="css/reviews.css">
    <script src="js/common.js"></script>
    <script src="js/reviews.js"></script>
</head>
<body>
<div class="app-wrapper">
    <div id="sidebar-container"></div>

    <div class="main-content" id="mainContent">
        <div id="header-container"></div>

        <div class="page-body">
            <a href="reviews.html" style="color: var(--muted); text-decoration: none; font-size: 14px; margin-bottom: 20px; display: inline-block;"><i class="fa-solid fa-arrow-left"></i> Quay lại Danh sách</a>
            
            <div class="panel product-info-panel">
                <h2>Đang tải thông tin sản phẩm...</h2>
                <div class="product-rating">
                    <span class="product-rating-stars"></span>
                    <span class="product-rating-count"></span>
                </div>
                <div class="product-stock"></div>
            </div>

            <div class="panel reviews-section">
                <div class="reviews-header">
                    <h3>Danh sách Đánh giá & Phản hồi</h3>
                </div>

                <div class="reviews-list">
                    <div style="text-align:center; padding:32px; color:var(--muted);">
                        <i class="fa-solid fa-spinner fa-spin" style="font-size:24px; margin-bottom:8px; display:block;"></i>
                        Đang tải đánh giá...
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
