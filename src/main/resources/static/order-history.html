<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử đơn hàng - HT Mobile</title>
    <link rel="stylesheet" href="../static/css/base.css">
    <link rel="stylesheet" href="../static/css/header.css">
    <link rel="stylesheet" href="../static/css/profile.css">
</head>

<body>
    <div id="header-placeholder"></div>

    <main class="noi-dung">
        <div class="profile-container">
            <div class="profile-sidebar">
                <div class="profile-avatar">
                    <img src="../static/img/user-interface.png" alt="Avatar">
                    <h3 id="sidebar-name">Loading...</h3>
                </div>
                <ul class="profile-menu">
                    <li><a href="profile.html">Thông tin tài khoản</a></li>
                    <li class="active"><a href="order-history.html">Lịch sử đơn hàng</a></li>
                    <li><a href="#" onclick="xuLyDangXuat()">Đăng xuất</a></li>
                </ul>
            </div>

            <div class="profile-content">
                <h2 class="tieu-de-phan">Lịch sử đơn hàng</h2>
                <p>Quản lý và theo dõi các đơn hàng bạn đã mua</p>
                <hr>

                <div class="order-tabs">
                    <button class="tab-btn active" data-status="">Tất cả</button>
                    <button class="tab-btn" data-status="WAIT">Chờ xác nhận</button>
                    <button class="tab-btn" data-status="DELIVERING">Đang giao</button>
                    <button class="tab-btn" data-status="DONE">Hoàn thành</button>
                    <button class="tab-btn" data-status="CANCEL">Đã hủy</button>
                </div>

                <div id="order-list" class="order-list">
                    <div style="text-align: center; padding: 20px;">Đang tải danh sách đơn hàng...</div>
                </div>

                <div id="pagination" class="pagination">
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../static/js/common.js"></script>
    <script src="../static/js/order-history.js"></script>
</body>

</html>
