<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản - HT Mobile</title>
    <link rel="stylesheet" href="../static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    
    <header class="thanh-nav">
        <div class="logo">HT Mobile</div>
        <div class="tim-kiem">
            <input type="text" placeholder="Bạn cần tìm điện thoại gì?">
        </div>
        <div class="nut-bam-header">
            <div class="tra-cuu-don-hang">
                <button>
                    <img src="../static/img/clipboard.png" alt="Tra cứu">
                    <h3>Tra cứu đơn hàng</h3>
                </button>
            </div>
            <div class="Dang-nhap">
                <a href="login.html" class="btn-header">
                    <img src="../static/img/user-interface.png" alt="Đăng nhập">
                    <h3>Đăng nhập</h3>
                </a>
            </div>
            <div class="gio-hang">
                <button>
                    <img src="../static/img/gio_hang.png" alt="Giỏ hàng">
                    <h3>Giỏ hàng</h3>
                </button>
            </div>
        </div>
    </header>

    <main class="noi-dung">
        <div class="login-container"> <div class="login-header">
                <h2>Đăng ký tài khoản</h2>
                <h3>Gia nhập cộng đồng HT Mobile ngay hôm nay</h3>
                <p>Bạn đã có tài khoản? <a href="login.html">Đăng nhập ngay</a></p>
            </div>

            <form class="login-form">
                <div class="form-group">
                    <label for="ho-va-ten">Họ và Tên</label>
                    <input type="text" id="ho-va-ten" placeholder="Nhập Họ và Tên">
                </div>

                <div class="form-group">
                    <label for="Email">Email</label>
                    <input type="text" id="Email" placeholder="Nhập địa chỉ Email">
                </div>

                <div class="form-group">
                    <label for="sdt">Số điện thoại</label>
                    <input type="text" id="sdt" placeholder="Nhập số điện thoại">
                </div>

                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" placeholder="Nhập mật khẩu">
                </div>

                <div class="role-selection">
                    <label>Giới tính:</label>
                    <div class="radio-group">
                        <label><input type="radio" name="gender" value="male" checked> Nam</label>
                        <label><input type="radio" name="gender" value="female"> Nữ</label>
                        <label><input type="radio" name="gender" value="other"> Khác</label>
                    </div>
                </div>
                
                <button type="submit" class="btn-login">Đăng ký</button>
            </form>

            <div class="social-login-section">
                <p class="divider"><span>Hoặc đăng ký nhanh bằng</span></p>
                <div class="social-buttons">
                    <button class="btn-google">
                        <i class="fa-brands fa-google"></i> Google
                    </button>
                    <button class="btn-facebook">
                        <i class="fa-brands fa-facebook-f"></i> Facebook
                    </button>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
