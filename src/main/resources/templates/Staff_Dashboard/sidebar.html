<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- Đoạn fragment này sẽ được nhúng vào các trang khác -->
    <nav th:fragment="sidebar" class="sidebar" id="sidebar">
        <button class="sidebar-toggle" id="sidebarToggle"><i class="fa-solid fa-chevron-left"></i></button>
        <div class="sidebar-logo">
            <span class="logo-icon"><i class="fa-solid fa-mobile-screen"></i></span>
            <span class="logo-text">HT Mobile Staff</span>
        </div>
        <nav class="sidebar-nav">
            <ul>
                <!-- Dùng Thymeleaf để check trang nào đang active -->
                <li class="nav-item" th:classappend="${activePage == 'dashboard'} ? 'active' : ''" data-label="Tổng quan">
                    <a th:href="@{/staff/dashboard}"><span class="nav-icon"><i class="fa-solid fa-chart-line"></i></span><span class="nav-label">Tổng quan</span></a>
                </li>
                <li class="nav-item" th:classappend="${activePage == 'pos'} ? 'active' : ''" data-label="Bán hàng (POS)">
                    <a th:href="@{/staff/pos}"><span class="nav-icon"><i class="fa-solid fa-cash-register"></i></span><span class="nav-label">Bán hàng (POS)</span></a>
                </li>
                <li class="nav-item" th:classappend="${activePage == 'orders'} ? 'active' : ''" data-label="Quản lý Đơn hàng">
                    <a th:href="@{/staff/orders}"><span class="nav-icon"><i class="fa-solid fa-cart-shopping"></i></span><span class="nav-label">Quản lý Đơn hàng</span></a>
                </li>
                <li class="nav-item" th:classappend="${activePage == 'products'} ? 'active' : ''" data-label="Tra cứu Sản phẩm">
                    <a th:href="@{/staff/products}"><span class="nav-icon"><i class="fa-solid fa-mobile-screen"></i></span><span class="nav-label">Tra cứu Sản phẩm</span></a>
                </li>
                <li class="nav-item" th:classappend="${activePage == 'warranty'} ? 'active' : ''" data-label="Tra cứu Bảo hành">
                    <a th:href="@{/staff/warranty}"><span class="nav-icon"><i class="fa-solid fa-shield-halved"></i></span><span class="nav-label">Tra cứu Bảo hành</span></a>
                </li>
                <div class="nav-divider"></div>
                <li class="nav-item logout" data-label="Đăng xuất">
                    <a th:href="@{/logout}"><span class="nav-icon"><i class="fa-solid fa-right-from-bracket"></i></span><span class="nav-label">Đăng xuất</span></a>
                </li>
            </ul>
        </nav>
    </nav>
</body>
</html>
