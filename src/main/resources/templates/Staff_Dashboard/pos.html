<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>POS Bán Hàng - HT Mobile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../static/staff/css/staff-base.css">
<link rel="stylesheet" href="../../static/staff/css/pos.css">
    <script src="../../static/js/api-client.js"></script>
    <script src="../../static/staff/js/common.js"></script>
    <script src="../../static/staff/js/pos.js"></script>
</head>
<body>
<div class="app-wrapper">
    <div id="sidebar-container"></div>

    <div class="main-content" id="mainContent">
        <div id="header-container"></div>

        <div class="page-body pos-page">
            <div class="pos-container">
                <div class="pos-products">
                    <div class="pos-search">
                        <input type="text" placeholder="Quét mã vạch hoặc Nhập tên Sản phẩm...">
                        <button><i class="fa-solid fa-search"></i> tìm kiếm</button>
                    </div>
                    
                    <div class="product-grid">
                        <div class="pos-item" onclick="addToCart('iPhone 15 Plus', 22990000)">
                            <img src="../../static/staff/img/iphone-15-plus_1__1.webp" alt="iPhone 15 Plus">
                            <h4>iPhone 15 Plus 256GB</h4>
                            <p>22.990.000 ₫</p>
                        </div>
                        
                        <div class="pos-item" onclick="addToCart('Samsung Galaxy S26 Ultra', 31990000)">
                            <img src="../../static/staff/img/samsung-galaxy-s26-ultra-1.webp" alt="S26 Ultra">
                            <h4>Samsung Galaxy S26 Ultra</h4>
                            <p>31.990.000 ₫</p>
                        </div>
                        
                        <div class="pos-item" onclick="addToCart('iPhone 17 Pro Max', 34500000)">
                            <img src="../../static/staff/img/iphone-17-pro-max_3.webp" alt="iPhone 17">
                            <h4>iPhone 17 Pro Max</h4>
                            <p>34.500.000 ₫</p>
                        </div>
                        
                        <div class="pos-item" onclick="addToCart('iPhone Air 3', 18990000)">
                            <img src="../../static/staff/img/iphone_air-3_2.webp" alt="iPhone Air 3">
                            <h4>iPhone Air 3</h4>
                            <p>18.990.000 ₫</p>
                        </div>
                    </div>
                </div>

                <div class="pos-cart">
                    <h3 class="cart-header"><i class="fa-solid fa-basket-shopping" style="color:var(--red); margin-right:8px;"></i> Đơn hàng hiện tại</h3>
                    <div class="cart-items" id="cart-items">
                        <div style="color: var(--muted); text-align: center; margin-top: 60px;">
                            <i class="fa-solid fa-cart-arrow-down" style="font-size: 48px; margin-bottom: 16px; opacity: 0.5;"></i>
                            <p>Chưa có Sản phẩm nào</p>
                        </div>
                    </div>
                    <div class="cart-summary">
                        <div class="summary-row">
                            <span>Tạm tính (<span id="total-qty">0</span> SP)</span>
                            <span id="subtotal">0 ₫</span>
                        </div>
                        <div class="summary-row">
                            <span>Chiết khấu/Giảm giá</span>
                            <span style="color:var(--green)">0 ₫</span>
                        </div>
                        <div class="summary-row total">
                            <span>THÀNH TIỀN</span>
                            <span id="total-price">0 ₫</span>
                        </div>
                        <button class="btn-checkout" onclick="checkout()"><i class="fa-solid fa-money-bill-wave"></i> THANH TOÁN NGAY</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
