<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Trang người dùng</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f5f5f5;
        }

        .header {
            background: #ff4d4f;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
        }

        .header input {
            width: 300px;
            padding: 5px;
        }

        .container {
            padding: 20px;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .product {
            background: white;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
        }

        .product img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .product button {
            background: #ff4d4f;
            color: white;
            border: none;
            padding: 8px;
            cursor: pointer;
            border-radius: 5px;
        }

        .product button:hover {
            background: #d9363e;
        }
    </style>
</head>

<body>

    <div class="header">
        <div><b>MyShop</b></div>
        <input type="text" placeholder="Tìm sản phẩm...">
        <div>Giỏ hàng (0)</div>
    </div>

    <div class="container">
        <h2>Sản phẩm nổi bật</h2>

        <div class="products">

            <div class="product">
                <img src="https://via.placeholder.com/200" alt="">
                <h3>iPhone 15</h3>
                <p>25,000,000 VND</p>
                <button>Thêm vào giỏ</button>
            </div>

            <div class="product">
                <img src="https://via.placeholder.com/200" alt="">
                <h3>Samsung S24</h3>
                <p>20,000,000 VND</p>
                <button>Thêm vào giỏ</button>
            </div>

            <div class="product">
                <img src="https://via.placeholder.com/200" alt="">
                <h3>Xiaomi 14</h3>
                <p>15,000,000 VND</p>
                <button>Thêm vào giỏ</button>
            </div>

        </div>
    </div>

</body>

</html>
