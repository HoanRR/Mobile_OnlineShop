<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
        }

        .sidebar {
            width: 200px;
            background: #222;
            color: white;
            height: 100vh;
            padding: 20px;
        }

        .sidebar h2 {
            text-align: center;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
        }

        .sidebar li {
            padding: 10px;
            cursor: pointer;
        }

        .sidebar li:hover {
            background: #444;
        }

        .main {
            flex: 1;
            padding: 20px;
            background: #f4f4f4;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
        }

        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2>ADMIN</h2>
        <ul>
            <li>Dashboard</li>
            <li>Sản phẩm</li>
            <li>Đơn hàng</li>
            <li>Người dùng</li>
        </ul>
    </div>

    <div class="main">
        <h1>Dashboard</h1>

        <div class="card">Doanh thu: 50,000,000 VND</div>
        <div class="card">Đơn hàng: 120</div>
        <div class="card">Người dùng: 300</div>

        <h2>Đơn hàng gần đây</h2>
        <table>
            <tr>
                <th>ID</th>
                <th>Khách hàng</th>
                <th>Sản phẩm</th>
            </tr>
            <tr>
                <td>1</td>
                <td>Nguyễn Văn A</td>
                <td>iPhone 15</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Trần Thị B</td>
                <td>Samsung S24</td>
            </tr>
        </table>

    </div>

</body>

</html>
