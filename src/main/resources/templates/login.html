<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - HT Mobile</title>
    <link rel="stylesheet" href="../static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    
    <header class="thanh-nav">
        <div class="logo">HT Mobile</div>
        <div class="tim-kiem">
            <input type="text" placeholder="Bạn cần tìm điện thoại gì?">
        </div>
        <div class="nut-bam-header">
            <div class="tra-cuu-don-hang">
                <button>
                    <img src="../static/img/clipboard.png" alt="Tra cứu">
                    <h3>Tra cứu đơn hàng</h3>
                </button>
            </div>
            <div class="Dang-nhap">
                <a href="login.html" class="btn-header">
                    <img src="../static/img/user-interface.png" alt="Đăng nhập">
                    <h3>Đăng nhập</h3>
                </a>
            </div>
            <div class="gio-hang">
                <button>
                    <img src="../static/img/gio_hang.png" alt="Giỏ hàng">
                    <h3>Giỏ hàng</h3>
                </button>
            </div>
        </div>
    </header>

    <main class="noi-dung">
        <div class="login-container">
            <div class="login-header">
                <h2>Đăng nhập</h2>
                <h3>Chào mừng bạn quay lại với HT Mobile</h3>
                <p>Bạn chưa có tài khoản? <a href="register.html">Đăng ký ngay</a></p>
            </div>

            <form class="login-form">
                <div class="role-selection">
                    <label>Bạn đăng nhập với tư cách:</label>
                    <div class="radio-group">
                        <label><input type="radio" name="role" value="customer" checked> Khách hàng</label>
                        <label><input type="radio" name="role" value="staff"> Nhân viên</label>
                        <label><input type="radio" name="role" value="admin"> Quản trị viên</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="username">Số điện thoại hoặc Email</label>
                    <input type="text" id="username" placeholder="Nhập tài khoản hoặc Email">
                </div>
            
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" placeholder="Nhập mật khẩu của bạn">
                </div>

                <div class="forgot-password">
                    <a href="#">Quên mật khẩu?</a>
                </div>
                
                <button type="submit" class="btn-login">Đăng nhập</button>
            </form>

            <div class="social-login-section">
                <p class="divider"><span>Hoặc đăng nhập bằng</span></p>
                <div class="social-buttons">
                    <button class="btn-google">
                        <i class="fa-brands fa-google"></i> Google
                    </button>
                    <button class="btn-facebook">
                        <i class="fa-brands fa-facebook-f"></i> Facebook
                    </button>
                </div>
            </div>
        </div>
    </main>
    
</body>
</html>
