<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cửa hàng Điện thoại HT</title>
    <link rel="stylesheet" href="../static/css/base.css">
    <link rel="stylesheet" href="../static/css/header.css">
    <link rel="stylesheet" href="../static/css/home.css">


</head>

<body>


    <div id="header-placeholder"></div>

    <main id="khu-vuc-trang-chu" class="noi-dung">

        <div class="slider-wrapper">
            <div class="slider-container">
                <div class="slider-track" style="transition: transform 0.5s ease-in-out;">
                    <div class="slide slide-1">
                        <div class="slide-content">
                            <span class="badge">ĐỈNH CAO CÔNG NGHỆ</span>
                            <h2>iPhone 15<br>Pro Max</h2>
                            <p class="specs">Titanium · A17 Pro · 48MP</p>
                            <a href="product-detail.html?id=1" class="btn-buy">Mua ngay</a>
                        </div>
                        <div class="slide-image">
                            <img src="https://tse3.mm.bing.net/th/id/OIP.v2gZ9YqRjr841Ch31Q18GAHaHa?rs=1&pid=ImgDetMain&o=7&rm=3"
                                alt="iPhone 15 Pro Max">
                        </div>
                    </div>

                    <div class="slide slide-2">
                        <div class="slide-content">
                            <span class="badge">QUYỀN NĂNG AI</span>
                            <h2>Samsung<br>Galaxy S24</h2>
                            <p class="specs">Galaxy AI · Snapdragon 8 Gen 3</p>
                            <a href="product-detail.html?id=2" class="btn-buy">Mua ngay</a>
                        </div>
                        <div class="slide-image">
                            <img src="https://tse3.mm.bing.net/th/id/OIP.v2gZ9YqRjr841Ch31Q18GAHaHa?rs=1&pid=ImgDetMain&o=7&rm=3"
                                alt="Samsung S24">
                        </div>
                    </div>

                    <div class="slide slide-3">
                        <div class="slide-content">
                            <span class="badge">SIÊU PHẨM TẦM TRUNG</span>
                            <h2>Xiaomi<br>Redmi Note 13</h2>
                            <p class="specs">120Hz · Sạc siêu nhanh 67W</p>
                            <a href="#" class="btn-buy">Mua ngay</a>
                        </div>
                        <div class="slide-image">
                            <img src="https://tse3.mm.bing.net/th/id/OIP.v2gZ9YqRjr841Ch31Q18GAHaHa?rs=1&pid=ImgDetMain&o=7&rm=3"
                                alt="Xiaomi">
                        </div>
                    </div>
                </div>
            </div>

            <button class="btn-slider btn-prev" id="btn-prv">❮</button>
            <button class="btn-slider btn-next" id="btn-next">❯</button>

            <div class="slider-dots" id="slider-dots">
                <span class="dot active"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>


        </div>

        <div class="danh-sach-san-pham" id="danh-sach-sp">


        </div>
    </main>

    <script src="../static/js/common.js"></script>
    <script src="../static/js/home.js"></script>
</body>

</html>
