<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../static/css/style.css">

</head>
<body>
    <div id="header-placeholder"></div>
    <div class="wrapper-product-detail">
        <div class="image-product-detail">
            <img src="https://tse3.mm.bing.net/th/id/OIP.v2gZ9YqRjr841Ch31Q18GAHaHa?rs=1&pid=ImgDetMain&o=7&rm=3">
        </div>
        <div class="inform-product-detail">
            <span>iphone</span>
            <h2>iPhone 15 Pro Max 256GB</h2>
            <div class="price-product-detail">
                <h2 style="display: inline;">29.999.000đ</h2>
                <div class="rating">⭐⭐⭐⭐⭐ (128 đánh giá)</div>
                <span id="old-price"><del>34.999.000đ</del></span>
                <span id="percent">-15%</span>
            </div>

            <div>
                <p>Dung lượng</p>
                <div class="button-dung-luong">
                    <button>128GB</button>
                    <button>256GB</button>
                    <button>512GB</button>

                </div>
            </div>
        </div>

    </div>

    <script src="../static/js/script.js"></script>
</body>
</html>
