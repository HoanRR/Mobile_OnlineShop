<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Mã giảm giá - HT Mobile Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../../static/admin/css/admin-base.css">
  <link rel="stylesheet" href="../../static/admin/css/vouchers.css">
  <script src="../../static/js/api-client.js"></script>
    <script src="../../static/admin/js/common.js"></script>
<script src="../../static/admin/js/vouchers.js"></script>
</head>
<body>
<div class="app-wrapper">
    <div id="sidebar-container"></div>

    <div class="main-content" id="mainContent">
        <div id="header-container"></div>

    <div class="page-body">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2 style="margin: 0; font-size: 20px; font-weight: 600;">Quản lý Mã giảm giá</h2>
        <button onclick="document.getElementById('voucherModal').style.display='flex';" class="btn-add"><i class="fa-solid fa-plus"></i> Thêm Mã giảm giá</button>
      </div>

      <div class="panel">
        <table class="admin-table">
          <thead><tr><th>Mã Code</th><th>Mức giảm</th><th>Đơn tối thiểu</th><th>Số lượng</th><th>Hạn sử dụng</th><th>Trạng thái</th><th>Thao tác</th></tr></thead>
          <tbody>
            <tr>
              <td><strong style="color: var(--red); font-size: 16px; background: var(--red-glow); padding: 4px 8px; border-radius: 6px; border: 1px dashed var(--red);">GIAM200K</strong></td>
              <td style="color:var(--green); font-weight:bold;">200.000 ₫</td>
              <td style="color:var(--text);">Từ 5.000.000 ₫</td>
              <td style="color:var(--muted)">50/100</td>
              <td style="color:var(--muted)">30/04/2026</td>
              <td><span style="background: rgba(34,197,94,0.18); color: var(--green); padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;">Đang hoạt động</span></td>
              <td><div class="action-btns"><button class="btn-edit">Gia hạn</button><button class="btn-delete">Xóa</button></div></td>
            </tr>
            <tr>
              <td><strong style="color: var(--red); font-size: 16px; background: var(--red-glow); padding: 4px 8px; border-radius: 6px; border: 1px dashed var(--red);">FREESHIP</strong></td>
              <td style="color:var(--green); font-weight:bold;">30.000 ₫</td>
              <td style="color:var(--text);">Mỗi đơn hàng</td>
              <td style="color:var(--muted)">0/500</td>
              <td style="color:var(--muted)">01/04/2026</td>
              <td><span style="background: rgba(239,68,68,0.18); color: #ef4444; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;">Đã hết hạn</span></td>
              <td><div class="action-btns"><button class="btn-edit">Gia hạn</button><button class="btn-delete">Xóa</button></div></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="voucherModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Thêm Mã Mới</h3>
        <button onclick="document.getElementById('voucherModal').style.display='none'" style="background:none; border:none; color:var(--muted); font-size:24px; cursor:pointer;">&times;</button>
      </div>
      <form>
        <div class="form-group"><label>Mã Code (Viết hoa không dấu)</label><input type="text" id="voucherCode" required></div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
          <div class="form-group"><label>Loại giảm giá</label><select id="discountType"><option>Phần trăm</option><option>Tiền mặt</option></select></div>
          <div class="form-group"><label>Mức giảm</label><input type="number" id="discountValue"></div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
          <div class="form-group"><label>Số lượng</label><input type="number" id="usageLimit"></div>
          <div class="form-group"><label>Đơn tối thiểu</label><input type="number" id="minOrder"></div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
          <div class="form-group"><label>Ngày bắt đầu</label><input type="date" id="startDate" required></div>
          <div class="form-group"><label>Hạn sử dụng</label><input type="date" id="endDate" required></div>
        </div>
        <div class="form-group"><label>Mã biến thể áp dụng</label><input type="text" id="productVariantIds" placeholder="VD: PV1001, PV1002"></div>
        <div style="text-align: right; display:flex; justify-content:flex-end; gap:10px; margin-top:10px;">
          <button type="button" class="btn-edit" onclick="document.getElementById('voucherModal').style.display='none'">Hủy</button>
          <button type="submit" class="btn-add">Lưu Voucher</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="extendVoucherModal">
    <div class="modal-content extend-modal">
      <div class="modal-header">
        <div>
          <h3>Gia hạn Mã giảm giá</h3>
          <p id="extendVoucherCodeText">Cập nhật hạn dùng và số lượng voucher.</p>
        </div>
        <button type="button" class="close-modal" data-close-extend>&times;</button>
      </div>
      <form id="extendVoucherForm">
        <input type="hidden" id="extendVoucherCode">
        <div class="form-group">
          <label>Hạn sử dụng mới</label>
          <input type="date" id="extendEndDate" required>
        </div>
        <div class="form-group">
          <label>Số lượt dùng tối đa</label>
          <input type="number" id="extendUsageLimit" min="1" required>
        </div>
        <div class="extend-current-info" id="extendCurrentInfo"></div>
        <div style="text-align: right; display:flex; justify-content:flex-end; gap:10px; margin-top:18px;">
          <button type="button" class="btn-edit" data-close-extend>Hủy</button>
          <button type="submit" class="btn-add"><i class="fa-solid fa-calendar-plus"></i> Lưu gia hạn</button>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
