<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Thêm Sản phẩm Mới - Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../../static/admin/css/admin-base.css">
  <link rel="stylesheet" href="../../static/admin/css/add-product.css">
  <script src="../../static/admin/js/add-product.js"></script>
</head>
<body>
<div class="app-wrapper">
  <nav class="sidebar" id="sidebar">
    <button class="sidebar-toggle" id="sidebarToggle"><i class="fa-solid fa-chevron-left"></i></button>
    <div class="sidebar-logo"><span class="logo-icon"><i class="fa-solid fa-mobile-screen"></i></span><span class="logo-text">HT Mobile Admin</span></div>
    <nav class="sidebar-nav">
      <ul>
        <li class="nav-item" data-label="Tổng quan"><a href="dashboard.html"><span class="nav-icon"><i class="fa-solid fa-chart-line"></i></span><span class="nav-label">Tổng quan</span></a></li>
        <li class="nav-item active" data-label="Quản lý Sản phẩm"><a href="products.html"><span class="nav-icon"><i class="fa-solid fa-mobile-screen"></i></span><span class="nav-label">Quản lý Sản phẩm</span></a></li>
        <li class="nav-item" data-label="Quản lý Đơn Hàng"><a href="orders.html"><span class="nav-icon"><i class="fa-solid fa-cart-shopping"></i></span><span class="nav-label">Quản lý Đơn Hàng</span></a></li>
        <li class="nav-item" data-label="Mã giảm giá"><a href="vouchers.html"><span class="nav-icon"><i class="fa-solid fa-ticket"></i></span><span class="nav-label">Mã giảm giá</span></a></li>
        <li class="nav-item" data-label="Quản lý Người dùng"><a href="users.html"><span class="nav-icon"><i class="fa-solid fa-users"></i></span><span class="nav-label">Quản lý Người dùng</span></a></li>
        <li class="nav-item" data-label="Quản lý Đánh giá"><a href="admin-reviews.html"><span class="nav-icon"><i class="fa-solid fa-star"></i></span><span class="nav-label">Quản lý Đánh giá</span></a></li>
        <div class="nav-divider"></div>
        <li class="nav-item logout"><a href="#"><span class="nav-icon"><i class="fa-solid fa-right-from-bracket"></i></span><span class="nav-label">Đăng xuất</span></a></li>
      </ul>
    </nav>
  </nav>

  <div class="main-content" id="mainContent">
    <header class="topbar">
      <div class="topbar-title"><span>HT</span> Mobile – Thêm Sản phẩm</div>
      <div class="topbar-right">
        <div class="topbar-date" id="currentDate"></div>
        <div class="topbar-user"><div class="avatar">AD</div> Xin chào, <strong>Admin</strong></div>
      </div>
    </header>

    <div class="page-body">
      <div style="max-width: 900px; margin: 0 auto;">
        <a href="products.html" style="color: var(--muted); text-decoration: none; font-size: 14px; margin-bottom: 20px; display: inline-block;"><i class="fa-solid fa-arrow-left"></i> Quay lại Danh sách</a>
        
        <form class="form-wrap">
          <h2 class="form-title">Thông tin chung</h2>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
              <div class="form-group"><label>Tên Sản phẩm</label><input type="text" placeholder="VD: iPhone 15 Pro Max" required></div>
              <div class="form-group"><label>Hãng (Brand)</label><select required><option value="">-- Chọn hãng --</option><option>Apple</option><option>Samsung</option></select></div>
            </div>
            <div>
              <div class="form-group" style="height: calc(100% - 20px);">
                <label>Ảnh đại diện</label>
                <div style="border: 2px dashed var(--border); border-radius: 10px; height: 100%; min-height: 140px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--muted); cursor: pointer;" onclick="document.getElementById('file-upload').click();">
                  <i class="fa-solid fa-cloud-arrow-up" style="font-size:30px; margin-bottom:10px;"></i><p>Bấm chọn ảnh</p>
                  <input type="file" id="file-upload" accept="image/*" style="display: none;">
                </div>
              </div>
            </div>
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group"><label>Chip xử lý</label><input type="text" placeholder="VD: Apple A17 Pro"></div>
            <div class="form-group"><label>Dung lượng Pin</label><input type="text" placeholder="VD: 4422 mAh"></div>
          </div>

          <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
            <h2 class="form-title" style="border:none; margin:0; padding:0;">Phiên bản cấu hình</h2>
            <button type="button" class="btn-edit" onclick="addVariantRow()"><i class="fa-solid fa-plus"></i> Thêm</button>
          </div>
          
          <table class="admin-table" id="variantTable">
            <thead><tr><th>RAM</th><th>Bộ nhớ</th><th>Màu sắc</th><th>Giá bán</th><th style="text-align: center;">Xóa</th></tr></thead>
            <tbody>
              <tr>
                <td><input type="text" placeholder="8GB" style="width:100%; padding:10px; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:6px;"></td>
                <td><input type="text" placeholder="256GB" style="width:100%; padding:10px; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:6px;"></td>
                <td><input type="text" placeholder="Titan" style="width:100%; padding:10px; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:6px;"></td>
                <td><input type="number" placeholder="29990000" style="width:100%; padding:10px; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:6px;"></td>
                <td style="text-align: center;"><button type="button" class="btn-delete"><i class="fa-solid fa-trash"></i></button></td>
              </tr>
            </tbody>
          </table>

          <div style="display: flex; justify-content: flex-end; margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px;">
            <button type="submit" class="btn-add"><i class="fa-solid fa-floppy-disk"></i> Lưu Sản phẩm</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
</body>
</html>
