<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đơn hàng - HT Mobile Admin</title>
    <link rel="stylesheet" href="../../static/admin/css/admin-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- CSS MỚI CHO TRANG ĐƠN HÀNG --- */
        /* Thanh công cụ lọc đơn hàng */
        .filter-bar {
            display: flex; gap: 15px; margin-bottom: 20px;
            background-color: #222; padding: 15px; border-radius: 10px;
        }
        .filter-bar input, .filter-bar select {
            padding: 10px; background-color: #333; color: white;
            border: 1px solid #444; border-radius: 5px; outline: none;
        }
        .filter-bar button {
            padding: 10px 20px; background-color: #e50000; color: white;
            border: none; border-radius: 5px; cursor: pointer; font-weight: bold;
        }
        
        /* Cục Badge màu sắc cho Trạng thái */
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge-pending { background-color: #ff9800; color: #fff; } /* Chờ xác nhận - Cam */
        .badge-shipping { background-color: #2196f3; color: #fff; } /* Đang giao - Xanh dương */
        .badge-success { background-color: #4caf50; color: #fff; } /* Hoàn thành - Xanh lá */
        .badge-cancelled { background-color: #f44336; color: #fff; } /* Đã hủy - Đỏ */

        .btn-update-status { background-color: #333; color: white; border: 1px solid #555; padding: 6px 12px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .btn-update-status:hover { background-color: #e50000; border-color: #e50000; }

        /* --- CSS CHO CỬA SỔ NỔI (MODAL) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7); display: none; 
            justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background-color: #222; padding: 30px; border-radius: 15px;
            width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #444;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 20px; }
        .modal-header h3 { color: #e50000; margin: 0; }
        .close-modal { color: #aaa; font-size: 24px; cursor: pointer; background: none; border: none; }
        .close-modal:hover { color: white; }
    </style>
</head>
<body>
    <div class="admin-wrapper">
        <div id="sidebar-container"></div>

        <main class="admin-content">
            <div id="header-container"></div>

            <div class="filter-bar">
                <input type="text" placeholder="Nhập mã đơn hoặc tên khách..." style="width: 250px;">
                <input type="date">
                <select>
                    <option value="">Tất cả trạng thái</option>
                    <option value="pending">Chờ xác nhận</option>
                    <option value="shipping">Đang giao hàng</option>
                    <option value="success">Đã hoàn thành</option>
                </select>
                <button><i class="fa-solid fa-filter"></i> Lọc</button>
            </div>

            <div class="table-container">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Mã Đơn</th>
                            <th>Khách hàng</th>
                            <th>Ngày đặt</th>
                            <th>Tổng tiền</th>
                            <th>Trạng thái</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><strong>#DH1001</strong></td>
                            <td>Nguyễn Văn A</td>
                            <td>06/04/2026</td>
                            <td style="color: #FF3D00; font-weight: bold;">29.990.000 ₫</td>
                            <td><span class="badge badge-pending">Chờ xác nhận</span></td>
                            <td>
                                <button class="btn-update-status" onclick="openModal('DH1001')">Cập nhật</button>
                            </td>
                        </tr>
                        <tr>
                            <td><strong>#DH1002</strong></td>
                            <td>Trần Thị B</td>
                            <td>05/04/2026</td>
                            <td style="color: #FF3D00; font-weight: bold;">15.500.000 ₫</td>
                            <td><span class="badge badge-shipping">Đang giao</span></td>
                            <td>
                                <button class="btn-update-status" onclick="openModal('DH1002')">Cập nhật</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="statusModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Cập nhật trạng thái</h3>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            
            <div style="margin-bottom: 20px;">
                <p style="color: #ccc; margin-bottom: 10px;">Mã đơn hàng: <strong id="modalOrderId" style="color: white;">---</strong></p>
                <label style="color: #ccc; display: block; margin-bottom: 8px;">Chọn trạng thái mới:</label>
                <select id="newStatus" style="width: 100%; padding: 10px; background-color: #333; color: white; border: 1px solid #444; border-radius: 5px;">
                    <option value="pending">Chờ xác nhận</option>
                    <option value="shipping">Đang giao hàng</option>
                    <option value="success">Giao thành công</option>
                    <option value="cancelled">Hủy đơn hàng</option>
                </select>
            </div>
            
            <div style="text-align: right;">
                <button onclick="closeModal()" style="padding: 10px 15px; background: none; color: #aaa; border: none; cursor: pointer;">Hủy bỏ</button>
                <button onclick="saveStatus()" style="padding: 10px 20px; background-color: #e50000; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Lưu thay đổi</button>
            </div>
        </div>
    </div>

    <script>
        // Mở Modal và hiển thị mã đơn
        function openModal(orderId) {
            document.getElementById('modalOrderId').innerText = '#' + orderId;
            document.getElementById('statusModal').style.display = 'flex';
        }

        // Đóng Modal
        function closeModal() {
            document.getElementById('statusModal').style.display = 'none';
        }

        // Giả lập nút Lưu
        function saveStatus() {
            alert('Đã cập nhật trạng thái thành công cho đơn ' + document.getElementById('modalOrderId').innerText);
            closeModal();
            // (Thực tế sau này ghép Backend, chỗ này sẽ gọi API để cập nhật vào Database)
        }
    </script>
    <script src="../../static/admin/js/admin-script.js"></script>
    <script>
        // Load Sidebar
        fetch('sidebar.html')
            .then(response => response.text())
            .then(data => document.getElementById('sidebar-container').innerHTML = data);
        
        // Load Header
        fetch('header.html')
            .then(response => response.text())
            .then(data => document.getElementById('header-container').innerHTML = data);
    </script>
</body>
</html>
