<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sản phẩm - HT Mobile Admin</title>
    <link rel="stylesheet" href="/admin/css/admin-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-wrapper">
        <nav class="admin-sidebar">
            <div class="admin-logo">HT Mobile Admin</div>
            <ul>
                <li><a href="dashboard.html"><i class="fa-solid fa-chart-line"></i> Tổng quan</a></li>
                <li class="active"><a href="products.html"><i class="fa-solid fa-mobile-screen"></i> Quản lý Sản phẩm</a></li>
                <li><a href="orders.html"><i class="fa-solid fa-cart-shopping"></i> Quản lý Đơn hàng</a></li>
                <li><a href="vouchers.html"><i class="fa-solid fa-ticket"></i> Mã giảm giá</a></li>
                <li><a href="users.html"><i class="fa-solid fa-users"></i> Quản lý Người dùng</a></li>
                <li style="margin-top: 30px;"><a href="#"><i class="fa-solid fa-right-from-bracket"></i> Đăng xuất</a></li>
            </ul>
        </nav>

        <main class="admin-content">
            <header class="content-header">
                <h2>Quản lý Sản phẩm</h2>
<button class="btn-add" onclick="window.location.href='add-product.html'"><i class="fa-solid fa-plus"></i> Thêm sản phẩm mới</button>            
</header>

            <div class="table-container">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tên sản phẩm</th>
                            <th>Danh mục</th>
                            <th>Giá bán</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>#001</td>
                            <td><strong>iPhone 15 Pro Max 256GB</strong></td>
                            <td>Apple</td>
                            <td style="color: #FF3D00; font-weight: bold;">29.990.000 ₫</td>
                            <td>
                                <div class="action-btns">
                                    <button class="btn-edit">Sửa</button>
                                    <button class="btn-delete">Xóa</button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="/admin/js/admin-script.js"></script>
</body>
</html>
