<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Quản lý Đánh giá - HT Mobile Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../../static/admin/css/admin-base.css">
  <link rel="stylesheet" href="../../static/admin/css/products.css">
  <link rel="stylesheet" href="../../static/admin/css/admin-reviews.css">
  <script src="../../static/js/api-client.js"></script>
    <script src="../../static/admin/js/common.js"></script>
<script src="../../static/admin/js/admin-reviews.js"></script>
</head>
<body>
<div class="app-wrapper">
    <div id="sidebar-container"></div>

    <div class="main-content" id="mainContent">
        <div id="header-container"></div>

    <div class="page-body">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2 style="margin: 0; font-size: 20px; font-weight: 600;">Tổng hợp Đánh giá Sản phẩm</h2>
      </div>

      <div class="filter-bar">
        <input type="text" placeholder="Tìm tên sản phẩm cần xem đánh giá..." style="width: 300px;">
        <select>
            <option value="">Lọc theo số sao TB</option>
            <option>Dưới 3 sao (Cần chú ý)</option>
            <option>Từ 4 sao trở lên</option>
        </select>
        <button class="btn-add"><i class="fa-solid fa-filter"></i> Lọc</button>
      </div>

      <div class="panel">
        <table class="admin-table">
          <thead>
            <tr>
                <th>ID</th>
                <th>Tên Sản phẩm</th>
                <th>Điểm Trung Bình</th>
                <th>Tổng số đánh giá</th>
                <th>Đánh giá mới nhất</th>
                <th>Thao tác</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td style="color: var(--muted);">#SP005</td>
              <td style="color: var(--text); font-weight: 500;">Samsung Galaxy A06 5G Chính hãng</td>
              <td><span style="color: #f59e0b; font-weight: bold;">5.0 <i class="fa-solid fa-star"></i></span></td>
              <td style="color: var(--text);">73 lượt</td>
              <td style="color: var(--muted); font-size: 13px;">Hôm nay, 19:42</td>
              <td><a href="admin-review-detail.html" class="btn-edit" style="text-decoration: none; display: inline-block;">Xem chi tiết</a></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
</body>
</html>
