<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Người dùng - HT Mobile Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../../static/admin/css/admin-base.css">
  <link rel="stylesheet" href="../../static/admin/css/users.css">
  <script src="../../static/js/api-client.js"></script>
    <script src="../../static/admin/js/common.js"></script>
<script src="../../static/admin/js/users.js"></script>
</head>
<body>
<div class="app-wrapper">
    <div id="sidebar-container"></div>

    <div class="main-content" id="mainContent">
        <div id="header-container"></div>

    <div class="page-body">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2 style="margin: 0; font-size: 20px; font-weight: 600;">Quản lý Người Dùng</h2>
        <button onclick="document.getElementById('staffModal').style.display='flex';" class="btn-add"><i class="fa-solid fa-user-plus"></i> Thêm nhân viên</button>
      </div>
      
      <div class="filter-bar">
        <input type="text" placeholder="Tìm tên, email, SĐT..." style="width: 250px;">
        <select><option value="">Tất cả vai trò</option><option>Admin</option><option>Nhân viên</option></select>
        <button class="btn-add"><i class="fa-solid fa-magnifying-glass"></i> Lọc</button>
      </div>

      <div class="panel">
        <table class="admin-table">
          <thead><tr><th>Họ và Tên</th><th>Email / SĐT</th><th>Vai trò</th><th>Trạng thái</th><th>Thao tác</th></tr></thead>
          <tbody>
            <tr>
              <td style="color:var(--text); font-weight:500;">Nguyễn Phúc Vinh </td>
              <td style="color:var(--muted)">thuy.npv@htmobile.com</td>
              <td><span style="background:rgba(156, 39, 176, 0.2); color:#e040fb; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;">Admin</span></td>
              <td><span style="color: var(--green); font-weight: 600;">Hoạt động</span></td>
              <td><button class="btn-edit">Sửa</button></td>
            </tr>
            <tr>
              <td style="color:var(--text); font-weight:500;">Nguyễn Thị Nga</td>
              <td style="color:var(--muted)">duyen.htt@htmobile.com</td>
              <td><span style="background:rgba(59,130,246,0.18); color:var(--blue); padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;">Nhân viên</span></td>
              <td><span style="color: var(--green); font-weight: 600;">Hoạt động</span></td>
              <td><div class="action-btns"><button class="btn-edit">Sửa</button><button class="btn-delete"><i class="fa-solid fa-lock"></i> Khóa</button></div></td>
            </tr>
            <tr>
              <td style="color:var(--text); font-weight:500;">Lê Thị Hồng Hạnh</td>
              <td style="color:var(--muted)">0987654321</td>
              <td><span style="background:rgba(255,255,255,0.1); color:var(--text); padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;">Khách hàng</span></td>
              <td><span style="color: #ef4444; font-weight: 600;">Bị cấm vĩnh viễn</span></td>
              <td><button class="btn-edit" style="color:var(--green); border-color:var(--green);"><i class="fa-solid fa-unlock"></i> Mở khóa</button></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="staffModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Thêm Nhân Viên</h3>
        <button onclick="document.getElementById('staffModal').style.display='none'" style="background:none; border:none; color:var(--muted); font-size:24px; cursor:pointer;">&times;</button>
      </div>
      <form>
        <div class="form-group"><label>Họ và tên</label><input type="text" required></div>
        <div class="form-group"><label>Username</label><input type="text" id="staffUsername" required></div>
        <div class="form-group"><label>Email</label><input type="email" id="staffEmail" required></div>
        <div class="form-group"><label>Số điện thoại</label><input type="tel" id="staffPhone" required></div>
        <div class="form-group"><label>Mật khẩu</label><input type="password" id="staffPassword" placeholder="Bỏ trống nếu chỉ sửa thông tin"></div>
        <div class="form-group" style="margin-bottom:25px;"><label>Phân quyền</label><select><option>Nhân viên bán hàng</option><option>Quản lý kho</option></select></div>
        <div style="text-align: right; display:flex; justify-content:flex-end; gap:10px;">
          <button type="button" class="btn-edit" onclick="document.getElementById('staffModal').style.display='none'">Hủy</button>
          <button type="submit" class="btn-add">Tạo tài khoản</button>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
