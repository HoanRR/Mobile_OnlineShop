<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
    <nav class="sidebar" id="sidebar" th:fragment="sidebar">
        <button class="sidebar-toggle" id="sidebarToggle" title="Thu gọn/Mở rộng">
            <i class="fa-solid fa-chevron-left"></i>
        </button>

        <div class="sidebar-logo">
            <span class="logo-icon"><i class="fa-solid fa-mobile-screen"></i></span>
            <span class="logo-text">HT Mobile Admin</span>
        </div>

        <nav class="sidebar-nav">
            <ul>
                <li class="nav-item" data-label="Tổng quan">
                    <a th:href="@{/admin/dashboard}">
                        <span class="nav-icon"><i class="fa-solid fa-chart-line"></i></span>
                        <span class="nav-label">Tổng quan</span>
                    </a>
                </li>
                <li class="nav-item" data-label="Quản lý Sản phẩm">
                    <a th:href="@{/admin/products}">
                        <span class="nav-icon"><i class="fa-solid fa-mobile-screen"></i></span>
                        <span class="nav-label">Quản lý Sản phẩm</span>
                    </a>
                </li>
                <li class="nav-item" data-label="Quản lý Đơn hàng">
                    <a th:href="@{/admin/orders}">
                        <span class="nav-icon"><i class="fa-solid fa-cart-shopping"></i></span>
                        <span class="nav-label">Quản lý Đơn hàng</span>
                    </a>
                </li>
                <li class="nav-item" data-label="Mã giảm giá">
                    <a th:href="@{/admin/vouchers}">
                        <span class="nav-icon"><i class="fa-solid fa-ticket"></i></span>
                        <span class="nav-label">Mã giảm giá</span>
                    </a>
                </li>
                <li class="nav-item" data-label="Quản lý Người dùng">
                    <a th:href="@{/admin/users}">
                        <span class="nav-icon"><i class="fa-solid fa-users"></i></span>
                        <span class="nav-label">Quản lý Người dùng</span>
                    </a>
                </li>
                <div class="nav-divider"></div>
                <li class="nav-item logout" data-label="Đăng xuất">
                    <a th:href="@{/logout}">
                        <span class="nav-icon"><i class="fa-solid fa-right-from-bracket"></i></span>
                        <span class="nav-label">Đăng xuất</span>
                    </a>
                </li>
            </ul>
        </nav>
    </nav>
</body>
</html>
