<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Kho thiết bị - HT Mobile Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../../static/admin/css/admin-base.css">
  <link rel="stylesheet" href="../../static/admin/css/devices.css">
  <script src="../../static/js/api-client.js"></script>
    <script src="../../static/admin/js/common.js"></script>
<script src="../../static/admin/js/devices.js"></script>
</head>
<body>
<div class="app-wrapper">
    <div id="sidebar-container"></div>

    <div class="main-content" id="mainContent">
        <div id="header-container"></div>

    <div class="page-body">
      <div class="page-heading">
        <h2>Quản lý IMEI thiết bị</h2>
        <a href="products.html" class="btn-secondary"><i class="fa-solid fa-arrow-left"></i> Sản phẩm</a>
      </div>

      <div class="device-grid">
        <section class="panel">
          <h3>Nhập thiết bị vào kho</h3>
          <form id="importDeviceForm" class="device-form">
            <div class="form-grid">
              <div class="form-group">
                <label>Tên sản phẩm</label>
                <input type="text" id="importProductName" placeholder="VD: iPhone 15 Pro Max" required>
              </div>
              <div class="form-group">
                <label>Mã biến thể sản phẩm</label>
                <input type="text" id="variantId" placeholder="VD: PV1001" required>
              </div>
            </div>
            <div class="form-grid">
              <div class="form-group">
                <label>Màu sắc</label>
                <input type="text" id="importColor" placeholder="VD: Titan">
              </div>
              <div class="form-group">
                <label>Bảo hành</label>
                <input type="number" id="warrantyMonths" min="1" value="12">
              </div>
            </div>
            <div class="form-group">
              <label>Danh sách IMEI</label>
              <textarea id="imeiListInput" placeholder="Mỗi dòng một IMEI hoặc cách nhau bằng dấu phẩy" required></textarea>
            </div>
            <div id="importDeviceMessage" class="form-message"></div>
            <button type="submit" class="btn-add"><i class="fa-solid fa-file-import"></i> Nhập kho</button>
          </form>
        </section>

        <section class="panel">
          <h3>Tra cứu thiết bị</h3>
          <div class="lookup-row">
            <input type="text" id="lookupImei" placeholder="Nhập IMEI cần tra">
            <button type="button" id="lookupBtn" class="btn-add"><i class="fa-solid fa-magnifying-glass"></i> Tra cứu</button>
          </div>
          <div id="deviceLookupResult" class="lookup-result"></div>
        </section>
      </div>

      <section class="panel">
        <div class="table-title">
          <h3>Danh sách thiết bị</h3>
          <span id="deviceCount">0 thiết bị</span>
        </div>
        <table class="admin-table">
          <thead>
            <tr>
              <th>Sản phẩm</th>
              <th>Mã biến thể</th>
              <th>Tổng nhập</th>
              <th>Còn kho</th>
              <th>Đã bán</th>
              <th>IMEI mới nhất</th>
              <th>Ngày nhập mới nhất</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
    </div>
  </div>
</div>
</body>
</html>
